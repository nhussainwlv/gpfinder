<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GPFinder - Find General Practitioners (GPs) in England by postcode or town.">
  <title>{% block title %}GPFinder - Find a GP in England{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <a href="/" class="logo">GPFinder</a>
        <p class="tagline">Find a GP practice in England</p>
      </div>
      <button type="button" class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="dark-mode-icon sun" aria-hidden="true"></span>
        <span class="dark-mode-icon moon" aria-hidden="true"></span>
      </button>
    </div>
  </header>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container footer-container">
      <p class="footer-built">
        Built by <a href="mailto:n.hussain30@wlv.ac.uk" class="footer-link">@Naeem</a>, with <span class="footer-heart" aria-hidden="true">♥</span> love
      </p>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
  <script>
    (function() {
      var STORAGE_KEY = "gpfinder-dark-mode";
      var btn = document.getElementById("darkModeToggle");
      function isDark() { return document.documentElement.classList.contains("dark-mode"); }
      function applyDark(dark) {
        document.documentElement.classList.toggle("dark-mode", dark);
        if (btn) {
          btn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
          btn.title = dark ? "Light mode" : "Dark mode";
        }
      }
      function toggle() {
        var next = !isDark();
        try { localStorage.setItem(STORAGE_KEY, next ? "1" : "0"); } catch (e) {}
        applyDark(next);
      }
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved !== null) applyDark(saved === "1");
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) applyDark(true);
      } catch (e) {}
      if (btn) { btn.addEventListener("click", toggle); }
    })();
  </script>
</body>
</html>
